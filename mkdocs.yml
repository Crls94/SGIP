site_name: SGIP — Sistema de Gestión de Inventario Predictivo
site_description: Documentación oficial del sistema SGIP. Backend Spring Boot, frontend React, IA predictiva con Streamlit y PostgreSQL.
site_url: https://ChriSHM29.github.io/sgipProy/
repo_url: https://github.com/ChriSHM29/sgipProy
repo_name: ChriSHM29/sgipProy
edit_uri: edit/version5.0/docs/

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Modo oscuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

plugins:
  - search:
      lang: es

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Arquitectura: arquitectura.md
  - Instalación: instalacion.md
  - Configuración: configuracion.md
  - API REST:
      - Endpoints: api/endpoints.md
  - Base de Datos: base-de-datos.md
  - Despliegue: despliegue.md
  - Testing: testing.md
  - Casos de Prueba: casos-prueba.md
  - IA Predictiva: ia-predictiva.md
  - Seguridad: seguridad.md
